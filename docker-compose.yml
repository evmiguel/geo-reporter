services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geo
    ports:
      - "54320:5432"
    volumes:
      - geo-pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"

volumes:
  geo-pg:
